<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #121212;
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: #f5f5f5;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 32px 28px 28px;
    }

    .auth-title {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      color: #f5f5f5;
      letter-spacing: -0.02em;
    }

    .tab-row {
      display: flex;
      border-bottom: 1px solid #333;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 0;
      margin-bottom: -1px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      color: #7a7a7a;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .tab-btn:hover { color: #f5f5f5; }

    .tab-btn.active {
      color: #f5f5f5;
      border-bottom-color: #f5f5f5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #f5f5f5;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .form-input::placeholder { color: #5a5a5a; }
    .form-input:focus { border-color: #7a7a7a; }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #f5f5f5;
      color: #121212;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #e0e0e0; }

    .result-msg {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #b91c1c;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <p class="auth-title">로그인 / 회원가입</p>

    <div class="tab-row">
      <button class="tab-btn active" id="login-tab">로그인</button>
      <button class="tab-btn" id="signup-tab">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="login-form">
      <div class="form-group">
        <input type="email" id="login-email" class="form-input" placeholder="이메일" />
        <input type="password" id="login-password" class="form-input" placeholder="비밀번호" />
      </div>
      <button id="loginBtn" class="submit-btn">로그인</button>
      <p id="login-result" class="result-msg"></p>
    </div>

    <!-- 회원가입 폼 -->
    <div id="signup-form" style="display: none;">
      <div class="form-group">
        <input type="email" id="signup-email" class="form-input" placeholder="이메일" />
        <input type="password" id="signup-password" class="form-input" placeholder="비밀번호 (6자 이상)" />
        <input type="password" id="signup-password-confirm" class="form-input" placeholder="비밀번호 확인" />
      </div>
      <button id="signupBtn" class="submit-btn">회원가입</button>
      <p id="signup-result" class="result-msg"></p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>

</body>
</html>

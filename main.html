<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Main</title>
</head>
<body>
    
<main class="container">
    <!--왼쪽 영역-->
    <div class="left-container">
        <a href="index.html" class="main-flag">
            <img src="img/Flag.png" alt="메인 깃발" />
        </a>
        <div class="polaroid">
            <img src="img/Polaroid.png" alt="폴라로이드" />
        </div>
    </div>

    <!--캐릭터 한마디-->
    <!--TODO: 따옴표 이미지를 못 찾겠음...-->

    <div class="right-container">
        <div class="top-section">
            <div class="site-logo">
                <img src="img/Sonder Logo.png" alt="메인 로고" />
                <div class="marquee-section">
                    <div id="marquee-board" data-page-id="main">메인 전광판</div>
                 </div>
            </div>
        </div>
        <div class="bottom-section">
            <div class="bottom-left">
                <img src="img/Menu BG.png" alt="">
            </div>
            <div class="bottom-right">
                <div class="recent-posts-widget">
                    <div class="rp-header">
                        <span class="rp-title">최근 백업</span>
                        <a href="backup.html" class="rp-more">더보기 →</a>
                    </div>
                    <ul class="rp-list" id="main-recent-posts">
                        <li class="rp-skeleton"></li>
                        <li class="rp-skeleton"></li>
                        <li class="rp-skeleton"></li>
                        <li class="rp-skeleton"></li>
                    </ul>
                </div>
                <img src="img/Guest Book BG.png" alt="">
            </div>
        </div>
    </div>

</main>

<script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/character.css">
    <title>캐릭터</title>
</head>
<body>
    
    <!--깃발 / 로고-->
    <div class="top-area">
        <a href="index.html" class="main-flag">
            <img src="img/Flag.png" alt="메인 깃발" />
        </a>
        <div class="site-logo">
            <img src="img/Chara Logo.png" alt="캐릭터 로고" />
        </div>
    </div>

    <header class="site-header">
        <div id="marquee-board" data-page-id="character">캐릭터 전광판</div>
        <nav>
            <div class="nav-btn">
                <a href="guestbook.html">방명록</a>
            </div>
            <div class="nav-btn">
                <a href="character.html">캐릭터</a>
            </div>
            <div class="nav-btn">
                <a href="backup.html">백업</a>
            </div>
        </nav>
    </header>

    <!--메인 영역-->
    <main>
        <div id="gallery" class="gallery"></div>
    </main>

    <!--편집 모달-->
    <div id="editModal" class="modal-overlay" hidden>
        <div class="modal-box">
            <h2 class="modal-title">카드 편집</h2>

            <div class="modal-preview">
                <img src="" alt="미리보기" id="previewImg" hidden />
                <div id="previewPlaceholder" class="preview-placeholder">+</div>
            </div>

            <label for="fileInput" class="file-label">이미지 선택</label>
            <input type="file" id="fileInput" accept="image/*" hidden />

            <input type="text" id="nameInput" class="name-input" placeholder="제목 입력" maxlength="20" />

            <p id="modalError" class="modal-error" hidden></p>

            <div class="modal-actions">
                <button id="removePhotoBtn" class="btn-text">삭제</button>
                <div class="modal-action-right">
                    <button id="cancelBtn" class="btn-cancel">취소</button>
                    <button id="saveBtn" class="btn-save">저장</button>
                </div>
            </div>
        </div>

    </div>
    


    <script type="module" src="js/character.js"></script>
</body>
</html>
